events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── 각 서비스 EC2 Private IP로 교체하세요 ─────────────────────────────────────
  upstream auth_service    { server <EC2-auth Private IP>:3001; }
  upstream hotel_service   { server <EC2-hotel Private IP>:3002; }
  upstream booking_service { server <EC2-booking Private IP>:3003; }
  upstream review_service  { server <EC2-review Private IP>:3004; }

  server {
    listen 80;

    location = /health {
      return 200 'nginx ok\n';
      add_header Content-Type text/plain;
    }

    # ── Auth Service ──────────────────────────────────────────────────────────
    location ~ ^/api/(auth|internal/users) {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         http://auth_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Review Service ────────────────────────────────────────────────────────
    location ~ ^/api/(reviews|hotels/[^/]+/reviews) {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         http://review_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Booking Service ───────────────────────────────────────────────────────
    location ~ ^/api/bookings {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         http://booking_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Hotel Service (default) ───────────────────────────────────────────────
    location ~ ^/api/ {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         http://hotel_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Frontend 정적 파일 ────────────────────────────────────────────────────
    location / {
      root   /usr/share/nginx/html;
      index  index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
