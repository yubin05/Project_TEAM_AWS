events {
  worker_connections 1024;
}

http {
  upstream auth_service    { server auth-service:3001; }
  upstream hotel_service   { server hotel-service:3002; }
  upstream booking_service { server booking-service:3003; }
  upstream review_service  { server review-service:3004; }

  server {
    listen 80;

    # ── Health check ────────────────────────────────────────────────────────────
    location = /health {
      return 200 'nginx ok\n';
      add_header Content-Type text/plain;
    }

    # ── Auth Service: /api/auth/* , /api/internal/users/* ─────────────────────
    location ~ ^/api/(auth|internal/users) {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         http://auth_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Review Service: /api/reviews/* , /api/hotels/*/reviews ────────────────
    location ~ ^/api/(reviews|hotels/[^/]+/reviews) {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         http://review_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Booking Service: /api/bookings/* ──────────────────────────────────────
    location ~ ^/api/bookings {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         http://booking_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Hotel Service: /api/* (default: hotels, wishlist, recommend, host) ────
    location ~ ^/api/ {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         http://hotel_service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Frontend static files ─────────────────────────────────────────────────
    location / {
      root   /usr/share/nginx/html;
      index  index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
