version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
#  로컬 테스트용 — AWS 서비스 연동 없음 (마이크로서비스 구조)
#  사용: docker compose -f docker-compose.local.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: localpassword
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=100
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-plocalpassword']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - '8000:8000'
    command: '-Xmx128m -jar DynamoDBLocal.jar -sharedDb -inMemory'
    networks:
      - app-network

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - '9324:9324'
      - '9325:9325'
    volumes:
      - ./elasticmq/elasticmq.conf:/opt/elasticmq.conf:ro
    networks:
      - app-network

  # ── Services ──────────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    env_file: ./services/auth-service/.env.local
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '3001:3001'
    volumes:
      - ./logs/auth:/app/logs
    networks:
      - app-network

  hotel-service:
    build:
      context: ./services/hotel-service
      dockerfile: Dockerfile
    env_file: ./services/hotel-service/.env.local
    depends_on:
      mysql:
        condition: service_healthy
      elasticmq:
        condition: service_started
      dynamodb-local:
        condition: service_started
    ports:
      - '3002:3002'
    volumes:
      - ./logs/hotel:/app/logs
    networks:
      - app-network

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    env_file: ./services/booking-service/.env.local
    depends_on:
      mysql:
        condition: service_healthy
      hotel-service:
        condition: service_started
    ports:
      - '3003:3003'
    volumes:
      - ./logs/booking:/app/logs
    networks:
      - app-network

  review-service:
    build:
      context: ./services/review-service
      dockerfile: Dockerfile
    env_file: ./services/review-service/.env.local
    depends_on:
      mysql:
        condition: service_healthy
      elasticmq:
        condition: service_started
      booking-service:
        condition: service_started
    ports:
      - '3004:3004'
    volumes:
      - ./logs/review:/app/logs
    networks:
      - app-network

  # ── API Gateway ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/public:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - hotel-service
      - booking-service
      - review-service
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
