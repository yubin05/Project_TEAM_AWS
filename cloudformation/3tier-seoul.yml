Parameters:
  KeyName:
    Description: EC2 KeyPair 이름
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: 기존 EC2 KeyPair 이름을 입력하세요
  LatestAmiId:
    Description: (수정 금지) Amazon Linux 2023 최신 AMI
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'
    AllowedValues:
      - /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
  GithubRepoUrl:
    Description: GitHub 레포지토리 HTTPS URL
    Type: String
    Default: https://github.com/yubin05/Project_TEAM_AWS.git
  JwtSecret:
    Description: JWT 시크릿 (모든 서비스 공유)
    Type: String
    NoEcho: true
    Default: change-me-jwt-secret-32chars
  InternalSecret:
    Description: 서비스 간 내부 통신 시크릿 (모든 서비스 공유)
    Type: String
    NoEcho: true
    Default: change-me-internal-secret

Resources:
  # ── SSM Session Manager — IAM Role + Instance Profile ─────────────────────────
  # EC2 콘솔 → 연결 → Session Manager 탭에서 키 없이 접속 가능
  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ThreeTier-SSM-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: ThreeTier-SSM-Role

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: ThreeTier-SSM-InstanceProfile
      Roles:
        - !Ref SSMRole

  # ── VPC ────────────────────────────────────────────────────────────────────────
  ThreeTierVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ThreeTier-VPC

  # ── IGW ────────────────────────────────────────────────────────────────────────
  ThreeTierIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ThreeTier-IGW
  ThreeTierVPCIGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ThreeTierVPC
      InternetGatewayId: !Ref ThreeTierIGW

  # ── 라우팅 테이블 ─────────────────────────────────────────────────────────────
  # 퍼블릭 (Frontend + NAT Instance)
  PublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ThreeTierVPC
      Tags:
        - Key: Name
          Value: ThreeTier-PublicRT
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: ThreeTierVPCIGWAttachment
    Properties:
      RouteTableId: !Ref PublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref ThreeTierIGW

  # 프라이빗 백엔드 (Auth / Hotel / Booking / Review EC2)
  PrivateBackendRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ThreeTierVPC
      Tags:
        - Key: Name
          Value: ThreeTier-PrivateBackendRT
  # 백엔드 → NAT Instance (git clone, Docker pull 등 외부 통신)
  PrivateBackendNATRoute:
    Type: AWS::EC2::Route
    DependsOn: NATInstance
    Properties:
      RouteTableId: !Ref PrivateBackendRT
      DestinationCidrBlock: 0.0.0.0/0
      NetworkInterfaceId: !Ref NATInstanceENI

  # 프라이빗 DB (MySQL EC2)
  PrivateDBRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ThreeTierVPC
      Tags:
        - Key: Name
          Value: ThreeTier-PrivateDBRT
  # DB → NAT Instance (mysql_install.sh, run-seed.sh 등 외부 통신)
  PrivateDBNATRoute:
    Type: AWS::EC2::Route
    DependsOn: NATInstance
    Properties:
      RouteTableId: !Ref PrivateDBRT
      DestinationCidrBlock: 0.0.0.0/0
      NetworkInterfaceId: !Ref NATInstanceENI

  # ── 서브넷 ────────────────────────────────────────────────────────────────────
  # 퍼블릭 서브넷 : Frontend EC2 (10.1.1.10), NAT Instance (10.1.1.100)
  PublicSN:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ThreeTierVPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.1.1.0/24
      Tags:
        - Key: Name
          Value: ThreeTier-PublicSN
  # 프라이빗 백엔드 서브넷 : Auth(10.1.2.10) / Hotel(10.1.2.20) / Booking(10.1.2.30) / Review(10.1.2.40)
  PrivateBackendSN:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ThreeTierVPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.1.2.0/24
      Tags:
        - Key: Name
          Value: ThreeTier-PrivateBackendSN
  # 프라이빗 DB 서브넷 : MySQL EC2 (10.1.3.10)
  PrivateDBSN:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ThreeTierVPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.1.3.0/24
      Tags:
        - Key: Name
          Value: ThreeTier-PrivateDBSN

  # ── 서브넷 - 라우팅 테이블 연결 ───────────────────────────────────────────────
  PublicSNRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT
      SubnetId: !Ref PublicSN
  PrivateBackendSNRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateBackendRT
      SubnetId: !Ref PrivateBackendSN
  PrivateDBSNRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateDBRT
      SubnetId: !Ref PrivateDBSN

  # ── 보안 그룹 ─────────────────────────────────────────────────────────────────
  # NAT Instance SG : VPC 내부 트래픽 포워딩 허용 (SSH 외부 오픈 없음 — SSM으로 접속)
  NATInstanceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ThreeTier-NATInstance-SG
      GroupDescription: NAT Instance Security Group
      VpcId: !Ref ThreeTierVPC
      Tags:
        - Key: Name
          Value: ThreeTier-NATInstance-SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: -1          # VPC 내부 → 인터넷 NAT 포워딩
          CidrIp: 10.1.0.0/16
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  # Frontend SG : 외부 HTTP 80만 허용 (SSH 외부 오픈 없음 — SSM으로 접속)
  FrontendSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ThreeTier-Frontend-SG
      GroupDescription: Frontend EC2 (nginx) Security Group
      VpcId: !Ref ThreeTierVPC
      Tags:
        - Key: Name
          Value: ThreeTier-Frontend-SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  # Backend SG : Frontend(10.1.1.0/24) 및 서비스 간 통신(10.1.2.0/24) 허용
  BackendSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ThreeTier-Backend-SG
      GroupDescription: Backend Services Security Group
      VpcId: !Ref ThreeTierVPC
      Tags:
        - Key: Name
          Value: ThreeTier-Backend-SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.1.0.0/16
        - IpProtocol: tcp           # Frontend → 각 백엔드 서비스 포트
          FromPort: 3001
          ToPort: 3004
          CidrIp: 10.1.1.0/24
        - IpProtocol: tcp           # 서비스 간 내부 통신 (booking→hotel, review→booking 등)
          FromPort: 3001
          ToPort: 3004
          CidrIp: 10.1.2.0/24
        - IpProtocol: tcp           # ElasticMQ (hotel EC2 9324) — booking, review 접근
          FromPort: 9324
          ToPort: 9324
          CidrIp: 10.1.2.0/24
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 10.1.0.0/16

  # MySQL SG : 백엔드 서브넷(10.1.2.0/24)에서만 3306 허용
  MySQLSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ThreeTier-MySQL-SG
      GroupDescription: MySQL EC2 Security Group
      VpcId: !Ref ThreeTierVPC
      Tags:
        - Key: Name
          Value: ThreeTier-MySQL-SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.1.0.0/16
        - IpProtocol: tcp           # 백엔드 서비스 → MySQL
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.1.2.0/24
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 10.1.0.0/16

  # ── NAT Instance ENI + EIP ────────────────────────────────────────────────────
  NATInstanceENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref PublicSN
      Description: NAT Instance ENI
      GroupSet:
        - !Ref NATInstanceSG
      PrivateIpAddress: 10.1.1.100
      Tags:
        - Key: Name
          Value: ThreeTier-NATInstance-ENI
  NATInstanceEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  NATInstanceEIPAssoc:
    Type: AWS::EC2::EIPAssociation
    DependsOn: NATInstance
    Properties:
      AllocationId: !GetAtt NATInstanceEIP.AllocationId
      NetworkInterfaceId: !Ref NATInstanceENI

  # Frontend EC2 EIP (브라우저 접속용 퍼블릭 IP)
  FrontendEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  FrontendEIPAssoc:
    Type: AWS::EC2::EIPAssociation
    DependsOn: FrontendEC2
    Properties:
      AllocationId: !GetAtt FrontendEIP.AllocationId
      InstanceId: !Ref FrontendEC2

  # ── NAT Instance ──────────────────────────────────────────────────────────────
  NATInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SourceDestCheck: false
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: ThreeTier-NATInstance
      NetworkInterfaces:
        - DeviceIndex: 0
          NetworkInterfaceId: !Ref NATInstanceENI
      UserData:
        Fn::Base64: |
          #!/bin/bash
          hostnamectl --static set-hostname ThreeTier-NATInstance
          cat <<EOT > /etc/profile.d/prompt.sh
          export PS1="[\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;36m\]\w\[\e[m\]]#"
          EOT
          source /etc/profile
          set -euxo pipefail
          IFACE="$(ip route show default | awk '/default/ {print $5; exit}')"
          dnf install -y iptables-services
          systemctl enable --now iptables
          cat > /etc/sysctl.d/90-nat.conf << 'EOF'
          net.ipv4.ip_forward=1
          EOF
          sysctl --system
          /sbin/iptables -t nat -F
          /sbin/iptables -F FORWARD
          /sbin/iptables -P FORWARD ACCEPT
          /sbin/iptables -t nat -A POSTROUTING -o "$IFACE" -j MASQUERADE
          service iptables save

  # ── MySQL EC2 ─────────────────────────────────────────────────────────────────
  # Private IP: 10.1.3.10 | 역할: MySQL 8.0 설치 + 4개 DB 초기화 + 시드 데이터
  MySQLEC2:
    Type: AWS::EC2::Instance
    DependsOn: PrivateDBNATRoute
    Properties:
      # InstanceType: t3.small
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: ThreeTier-MySQL-EC2
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref PrivateDBSN
          GroupSet:
            - !Ref MySQLSG
          PrivateIpAddress: 10.1.3.10
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          hostnamectl --static set-hostname ThreeTier-MySQL-EC2
          cat <<EOT > /etc/profile.d/prompt.sh
          export PS1="[\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;36m\]\w\[\e[m\]]#"
          EOT
          source /etc/profile
          set -euxo pipefail

          # 레포지토리 클론 (database/ 폴더만)
          dnf install -y git
          git clone --filter=blob:none --sparse ${GithubRepoUrl} /opt/app
          cd /opt/app
          git sparse-checkout set database

          # MySQL 8.0 설치 및 설정
          sudo bash database/scripts/mysql_install.sh

          # 4개 DB 생성 + 시드 데이터 삽입
          bash database/scripts/run-seed.sh

  # ── Frontend EC2 (nginx) ──────────────────────────────────────────────────────
  # Private IP: 10.1.1.10 | 역할: nginx API Gateway + 정적 파일 서빙
  FrontendEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: ThreeTier-Frontend-EC2
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref PublicSN
          GroupSet:
            - !Ref FrontendSG
          PrivateIpAddress: 10.1.1.10
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          hostnamectl --static set-hostname ThreeTier-Frontend-EC2
          cat <<EOT > /etc/profile.d/prompt.sh
          export PS1="[\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;36m\]\w\[\e[m\]]#"
          EOT
          source /etc/profile
          set -euxo pipefail

          # nginx, git 설치
          dnf install -y nginx git
          systemctl enable --now nginx

          # 레포지토리 클론 (frontend/, nginx/ 폴더만)
          git clone --filter=blob:none --sparse ${GithubRepoUrl} /opt/app
          cd /opt/app
          git sparse-checkout set frontend nginx

          # nginx 설정 — 백엔드 서비스 Private IP 주입
          cp nginx/nginx.frontend.conf /etc/nginx/nginx.conf
          sed -i 's/<EC2-auth Private IP>/10.1.2.10/g'    /etc/nginx/nginx.conf
          sed -i 's/<EC2-hotel Private IP>/10.1.2.20/g'   /etc/nginx/nginx.conf
          sed -i 's/<EC2-booking Private IP>/10.1.2.30/g' /etc/nginx/nginx.conf
          sed -i 's/<EC2-review Private IP>/10.1.2.40/g'  /etc/nginx/nginx.conf

          # 정적 파일 복사
          cp -r frontend/public/* /usr/share/nginx/html/

          # nginx 재시작
          nginx -t && systemctl restart nginx

  # ── Auth Service EC2 ──────────────────────────────────────────────────────────
  # Private IP: 10.1.2.10 | 포트: 3001 | DB: auth_db
  AuthEC2:
    Type: AWS::EC2::Instance
    DependsOn: PrivateBackendNATRoute
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: ThreeTier-Auth-EC2
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref PrivateBackendSN
          GroupSet:
            - !Ref BackendSG
          PrivateIpAddress: 10.1.2.10
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          hostnamectl --static set-hostname ThreeTier-Auth-EC2
          cat <<EOT > /etc/profile.d/prompt.sh
          export PS1="[\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;36m\]\w\[\e[m\]]#"
          EOT
          source /etc/profile
          set -euxo pipefail

          # Docker 설치
          dnf install -y docker git
          systemctl enable --now docker
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          curl -SL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 \
            -o /usr/local/lib/docker/cli-plugins/docker-buildx
          chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

          # 레포지토리 클론
          git clone --filter=blob:none --sparse ${GithubRepoUrl} /opt/app
          cd /opt/app
          git sparse-checkout set backend/auth-service

          # 환경변수 파일 생성
          cat > backend/auth-service/.env.mysql-ec2 << 'ENVEOF'
          APP_MODE=local
          PORT=3001
          DB_HOST=10.1.3.10
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=P@ssw0rd
          DB_NAME=auth_db
          JWT_SECRET=${JwtSecret}
          INTERNAL_SECRET=${InternalSecret}
          CORS_ORIGIN=http://${FrontendEIP}
          ENVEOF

          # docker-compose 파일 생성 및 실행
          cat > docker-compose.auth.yml << 'DCEOF'
          services:
            auth-service:
              build:
                context: ./backend/auth-service
                dockerfile: Dockerfile
              env_file: ./backend/auth-service/.env.mysql-ec2
              ports:
                - '3001:3001'
              restart: on-failure
          DCEOF

          docker compose -f docker-compose.auth.yml up -d --build

  # ── Hotel Service EC2 ─────────────────────────────────────────────────────────
  # Private IP: 10.1.2.20 | 포트: 3002 | DB: hotel_db | ElasticMQ: 9324
  HotelEC2:
    Type: AWS::EC2::Instance
    DependsOn: PrivateBackendNATRoute
    Properties:
      # InstanceType: t3.small
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: ThreeTier-Hotel-EC2
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref PrivateBackendSN
          GroupSet:
            - !Ref BackendSG
          PrivateIpAddress: 10.1.2.20
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          hostnamectl --static set-hostname ThreeTier-Hotel-EC2
          cat <<EOT > /etc/profile.d/prompt.sh
          export PS1="[\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;36m\]\w\[\e[m\]]#"
          EOT
          source /etc/profile
          set -euxo pipefail

          # 스왑 메모리 추가 (Bedrock, SQS Consumer 상시 실행)
          dd if=/dev/zero of=/swapfile bs=128M count=16
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile swap swap defaults 0 0' >> /etc/fstab

          # Docker 설치
          dnf install -y docker git
          systemctl enable --now docker
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          curl -SL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 \
            -o /usr/local/lib/docker/cli-plugins/docker-buildx
          chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

          # 레포지토리 클론
          git clone --filter=blob:none --sparse ${GithubRepoUrl} /opt/app
          cd /opt/app
          git sparse-checkout set backend/hotel-service elasticmq

          # 환경변수 파일 생성
          cat > backend/hotel-service/.env.mysql-ec2 << 'ENVEOF'
          APP_MODE=local
          PORT=3002
          DB_HOST=10.1.3.10
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=P@ssw0rd
          DB_NAME=hotel_db
          JWT_SECRET=${JwtSecret}
          INTERNAL_SECRET=${InternalSecret}
          CORS_ORIGIN=http://${FrontendEIP}
          AWS_REGION=ap-northeast-2
          DYNAMODB_ENDPOINT=http://localhost:8000
          SQS_ENDPOINT=http://elasticmq:9324
          SQS_QUEUE_URL=http://elasticmq:9324/000000000000/rating-queue
          BOOKING_SERVICE_URL=http://10.1.2.30:3003
          REVIEW_SERVICE_URL=http://10.1.2.40:3004
          ENVEOF

          # docker-compose 파일 생성 및 실행 (ElasticMQ 포함)
          cat > docker-compose.hotel.yml << 'DCEOF'
          services:
            elasticmq:
              image: softwaremill/elasticmq-native:latest
              ports:
                - '9324:9324'
                - '9325:9325'
              volumes:
                - ./elasticmq/elasticmq.conf:/opt/elasticmq.conf:ro

            hotel-service:
              build:
                context: ./backend/hotel-service
                dockerfile: Dockerfile
              env_file: ./backend/hotel-service/.env.mysql-ec2
              ports:
                - '3002:3002'
              depends_on:
                - elasticmq
              restart: on-failure
          DCEOF

          docker compose -f docker-compose.hotel.yml up -d --build

  # ── Booking Service EC2 ───────────────────────────────────────────────────────
  # Private IP: 10.1.2.30 | 포트: 3003 | DB: booking_db
  BookingEC2:
    Type: AWS::EC2::Instance
    DependsOn: PrivateBackendNATRoute
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: ThreeTier-Booking-EC2
      NetworkInterfaces:
