name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

env:
  ACR_NAME: threetierdracr
  ACR_LOGIN_SERVER: threetierdracr.azurecr.io
  RESOURCE_GROUP: threetier-dr-rg
  ACA_ENVIRONMENT: threetier-dr-aca-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - hotel-service
          - booking-service
          - review-service
          - support-service

    steps:
      - uses: actions/checkout@v4

      - name: Azure 로그인
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR 로그인
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Docker 이미지 빌드 및 푸시
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }} \
            ./backend/${{ matrix.service }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}

      - name: ACA 배포
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ matrix.service }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppEnvironment: ${{ env.ACA_ENVIRONMENT }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}

      # hotel-service: AWS 장애 시 Azure Blob SAS 업로드를 위한 환경변수
      # (terraform-azure/azure-aca.tf의 env는 ignore_changes=[template]로 인해
      #  이 워크플로우가 배포한 revision에는 적용되지 않으므로 여기서 직접 설정)
      - name: hotel-service 환경변수 설정 (Azure Blob)
        if: matrix.service == 'hotel-service'
        run: |
          az containerapp update \
            --name hotel-service \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              APP_MODE=azure \
              AZURE_STORAGE_ACCOUNT=threetierdruploadsmain \
              AZURE_STORAGE_KEY=secretref:azure-storage-key
